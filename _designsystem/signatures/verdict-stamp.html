<!-- @dsCard group="Signatures" name="22강 · 판정 스탬프" subtitle="확인됨·사실과 다름·일부 다름 배지 + 근거 자료 카드" width="560" height="280" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>22강 · 판정 스탬프 시그니처</title>
<style>
:root {
  --sky:#5B9CF6; --sky-light:#EBF3FF;
  --mint:#34D399; --mint-light:#D1FAE5;
  --amber:#FBBF24; --amber-light:#FEF3C7;
  --coral:#F87171; --coral-light:#FEE2E2;
  --purple:#A78BFA; --purple-light:#EDE9FE;
  --bg:#F0F7FF; --card:#FFFFFF;
  --text:#1E293B; --text-muted:#64748B; --border:#E2E8F0;
  --radius:20px; --radius-sm:12px;
  --shadow:0 4px 20px rgba(91,156,246,.12);
  --shadow-lg:0 8px 40px rgba(91,156,246,.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px 20px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 32px 40px;
  max-width: 500px;
  width: 100%;
}
.chip {
  display: inline-block;
  background: var(--coral);
  color: white;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 14px;
  border-radius: 999px;
  margin-bottom: 20px;
  letter-spacing: .04em;
}

/* 판정 배지 3종 나열 */
.stamps {
  display: flex;
  gap: 14px;
  margin-bottom: 22px;
  flex-wrap: wrap;
  justify-content: center;
}

/* 도장 공통 — 흰 테두리 + 살짝 회전 */
.vbadge {
  display: inline-block;
  font-size: 15px;
  font-weight: 900;
  padding: 8px 20px;
  border-radius: 8px;
  letter-spacing: -.01em;
  white-space: nowrap;
  border: 3px solid white;
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
}
/* 도장 3종 — 각각 미묘하게 다른 기울기 */
.v-ok {
  background: var(--mint);
  color: white;
  outline: 2.5px solid #059669;
  outline-offset: -1px;
  transform: rotate(-2.5deg);
  animation: stamp1 .5s cubic-bezier(.25,1.6,.5,1) both .1s;
}
.v-no {
  background: var(--coral);
  color: white;
  outline: 2.5px solid #DC2626;
  outline-offset: -1px;
  transform: rotate(1.8deg);
  animation: stamp1 .5s cubic-bezier(.25,1.6,.5,1) both .3s;
}
.v-half {
  background: var(--amber);
  color: white;
  outline: 2.5px solid #D97706;
  outline-offset: -1px;
  transform: rotate(-1.2deg);
  animation: stamp1 .5s cubic-bezier(.25,1.6,.5,1) both .5s;
}
@keyframes stamp1 {
  from { opacity: 0; transform: rotate(var(--r, 0deg)) scale(1.45); }
  to   { opacity: 1; }
}

/* 근거 자료 카드 */
.evi-wrap { position: relative; margin-top: 4px; }
.evi {
  background: var(--sky-light);
  border-top: 3px solid var(--sky);
  border-radius: 0 var(--radius-sm) var(--radius-sm) var(--radius-sm);
  padding: 12px 14px;
  font-size: 14px;
  position: relative;
  animation: openup .35s ease both .7s;
  opacity: 0;
}
.evi::before {
  content: '📁 근거 자료';
  position: absolute;
  top: -30px; left: 0;
  background: var(--sky);
  color: white;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 14px 0;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  height: 30px;
  display: flex;
  align-items: center;
}
@keyframes openup {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.src-badge {
  display: inline-block;
  background: var(--sky);
  color: white;
  font-size: 11.5px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 999px;
  margin-bottom: 6px;
}

@media (prefers-reduced-motion: reduce) {
  .vbadge { animation: none !important; }
  .evi { animation: none !important; opacity: 1; }
}
</style>
</head>
<body>
<div class="card">
  <span class="chip">AI 탐험대 · 22강 · 팩트체크 탐정</span>
  <div class="stamps">
    <span class="vbadge v-ok"  aria-label="확인됨">확인됨 ✅</span>
    <span class="vbadge v-no"  aria-label="사실과 다름">사실과 다름 ❌</span>
    <span class="vbadge v-half" aria-label="일부 다름">일부 다름 ⚠️</span>
  </div>
  <div class="evi-wrap">
    <div class="evi">
      <span class="src-badge">NASA 공식 자료 요약</span>
      <p>1969년 7월 20일, 아폴로 11호의 <b>닐 암스트롱</b>이 달 표면에 첫발을 내디뎠어요. 버즈 올드린은 약 19분 뒤 두 번째로 내렸어요.</p>
    </div>
  </div>
</div>
</body>
</html>
