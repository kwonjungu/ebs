<!-- @dsCard group="Signatures" name="16·23강 · 뷰파인더 HUD" subtitle="어두운 스테이지·mint L자 브래킷·탐지 박스·모노스페이스 라벨" width="560" height="280" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16·23강 · 뷰파인더 HUD 시그니처</title>
<style>
:root {
  --sky:#5B9CF6; --sky-light:#EBF3FF;
  --mint:#34D399; --mint-light:#D1FAE5;
  --amber:#FBBF24; --amber-light:#FEF3C7;
  --coral:#F87171; --coral-light:#FEE2E2;
  --purple:#A78BFA; --purple-light:#EDE9FE;
  --bg:#F0F7FF; --card:#FFFFFF;
  --text:#1E293B; --text-muted:#64748B; --border:#E2E8F0;
  --radius:20px; --radius-sm:12px;
  --shadow:0 4px 20px rgba(91,156,246,.12);
  --shadow-lg:0 8px 40px rgba(91,156,246,.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px 20px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 28px 36px;
  max-width: 520px;
  width: 100%;
}
.chip {
  display: inline-block;
  background: var(--mint);
  color: white;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 14px;
  border-radius: 999px;
  margin-bottom: 16px;
  letter-spacing: .04em;
}

/* 어두운 뷰파인더 스테이지 */
.stage {
  position: relative;
  background: #0F172A;
  border-radius: var(--radius-sm);
  aspect-ratio: 16 / 7;
  overflow: hidden;
}

/* HUD 격자 오버레이 */
.grid-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(52,211,153,.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(52,211,153,.1) 1px, transparent 1px);
  background-size: 20% 25%;
}

/* 네 모서리 mint L자 브래킷 */
.hud-corner {
  position: absolute;
  width: 22px;
  height: 22px;
  border-color: var(--mint);
  border-style: solid;
  z-index: 3;
}
.hud-tl { top: 8px;  left: 8px;  border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
.hud-tr { top: 8px;  right: 8px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
.hud-bl { bottom: 8px; left: 8px;  border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
.hud-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

/* 탐지 박스 SVG 안에 그릴 것들을 절대 배치 */
.stage-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* 좌표 + 라벨 패널 (스테이지 아래) */
.coords {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}
.coord-box {
  background: var(--mint-light);
  border-radius: var(--radius-sm);
  text-align: center;
  padding: 8px 6px 10px;
  border: 1.5px solid rgba(52,211,153,.4);
}
.coord-box .lab {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  display: block;
  margin-bottom: 2px;
}
.coord-box .val {
  font-size: 26px;
  font-weight: 900;
  color: #059669;
  font-family: 'Courier New', 'Consolas', monospace;
  letter-spacing: .04em;
  line-height: 1.15;
  display: block;
}

/* 탐지 박스 등장 애니메이션 */
.det-box {
  animation: boxin .5s ease-out both .4s;
}
@keyframes boxin {
  from { opacity: 0; transform: scale(1.06); }
  to   { opacity: 1; transform: scale(1); }
}

/* 라벨 배경 */
.det-label-bg { animation: boxin .5s ease-out both .4s; }
.det-label-txt { animation: boxin .5s ease-out both .5s; }

@media (prefers-reduced-motion: reduce) {
  .det-box, .det-label-bg, .det-label-txt { animation: none; opacity: 1; }
}
</style>
</head>
<body>
<div class="card">
  <span class="chip">AI 탐험대 · 16·23강 · 뷰파인더 HUD</span>
  <div class="stage" aria-label="뷰파인더 HUD 데모">
    <!-- 격자 오버레이 -->
    <div class="grid-overlay" aria-hidden="true"></div>
    <!-- 네 모서리 브래킷 -->
    <div class="hud-corner hud-tl" aria-hidden="true"></div>
    <div class="hud-corner hud-tr" aria-hidden="true"></div>
    <div class="hud-corner hud-bl" aria-hidden="true"></div>
    <div class="hud-corner hud-br" aria-hidden="true"></div>

    <!-- SVG 탐지 박스 + 라벨 -->
    <svg class="stage-svg" viewBox="0 0 560 196" role="img" aria-label="객체 탐지 박스 예시">
      <!-- 이모지 물건들 (배경 장식) -->
      <text x="96" y="138" font-size="64" opacity=".85">🍵</text>
      <text x="270" y="148" font-size="56" opacity=".85">📕</text>
      <text x="420" y="150" font-size="60" opacity=".85">🎒</text>

      <!-- 탐지 박스 1 — 컵 -->
      <g class="det-box">
        <rect x="74" y="76" width="96" height="108" fill="none" stroke="#34D399" stroke-width="3" rx="4"/>
        <!-- 네 모서리 흰색 강조 브래킷 -->
        <polyline points="89,76 74,76 74,91" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="155,76 170,76 170,91" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="74,169 74,184 89,184" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="170,169 170,184 155,184" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      </g>
      <rect class="det-label-bg" x="74" y="54" width="76" height="22" rx="5" fill="rgba(15,23,42,.85)"/>
      <text class="det-label-txt" x="80" y="70" font-size="13" font-weight="700" fill="#34D399" font-family="'Courier New',Consolas,monospace">컵 91%</text>

      <!-- 탐지 박스 2 — 책 -->
      <g class="det-box">
        <rect x="252" y="88" width="108" height="96" fill="none" stroke="#34D399" stroke-width="3" rx="4"/>
        <polyline points="267,88 252,88 252,103" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="345,88 360,88 360,103" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="252,169 252,184 267,184" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="360,169 360,184 345,184" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      </g>
      <rect class="det-label-bg" x="252" y="66" width="80" height="22" rx="5" fill="rgba(15,23,42,.85)"/>
      <text class="det-label-txt" x="258" y="82" font-size="13" font-weight="700" fill="#34D399" font-family="'Courier New',Consolas,monospace">책 87%</text>

      <!-- 탐지 박스 3 — 가방 -->
      <g class="det-box">
        <rect x="405" y="72" width="112" height="116" fill="none" stroke="#34D399" stroke-width="3" rx="4"/>
        <polyline points="420,72 405,72 405,87" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="502,72 517,72 517,87" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="405,173 405,188 420,188" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <polyline points="517,173 517,188 502,188" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      </g>
      <rect class="det-label-bg" x="405" y="50" width="92" height="22" rx="5" fill="rgba(15,23,42,.85)"/>
      <text class="det-label-txt" x="411" y="66" font-size="13" font-weight="700" fill="#34D399" font-family="'Courier New',Consolas,monospace">가방 84%</text>
    </svg>
  </div>

  <!-- 좌표 패널 -->
  <div class="coords">
    <div class="coord-box">
      <span class="lab">탐지 중심 X (가로)</span>
      <span class="val">312</span>
    </div>
    <div class="coord-box">
      <span class="lab">탐지 중심 Y (세로)</span>
      <span class="val">148</span>
    </div>
  </div>
</div>
</body>
</html>
