<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17강 · 유사도 게이지 시그니처</title>
<style>
:root {
  --sky:#5B9CF6; --sky-light:#EBF3FF;
  --mint:#34D399; --mint-light:#D1FAE5;
  --amber:#FBBF24; --amber-light:#FEF3C7;
  --coral:#F87171; --coral-light:#FEE2E2;
  --purple:#A78BFA; --purple-light:#EDE9FE;
  --bg:#F0F7FF; --card:#FFFFFF;
  --text:#1E293B; --text-muted:#64748B; --border:#E2E8F0;
  --radius:20px; --radius-sm:12px;
  --shadow:0 4px 20px rgba(91,156,246,.12);
  --shadow-lg:0 8px 40px rgba(91,156,246,.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 36px 44px;
  max-width: 500px;
  width: 100%;
}
.chip {
  display: inline-block;
  background: var(--mint);
  color: white;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 14px;
  border-radius: 999px;
  margin-bottom: 18px;
  letter-spacing: .04em;
}
.score-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 12px;
}
.score-row .label {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 700;
}
.score-row .num {
  font-size: 42px;
  font-weight: 900;
  color: var(--mint);
  line-height: 1;
  letter-spacing: -.03em;
}
.score-row .denom {
  font-size: 18px;
  color: var(--text-muted);
}

/* 게이지 트랙 */
.gauge {
  position: relative;
  background: #F1F5F9;
  border-radius: 999px;
  height: 26px;
  margin-bottom: 6px;
  overflow: visible;
}
/* 채워진 바 */
.gauge-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--mint);
  width: 0%;
  animation: fillup 1.2s cubic-bezier(.25,.8,.25,1) forwards .3s;
}
@keyframes fillup {
  from { width: 0%; }
  to   { width: 82%; }
}
/* 확인 구간 점선 띠 (기준값-10 ~ 기준값) */
.gauge-check {
  position: absolute;
  top: 0; bottom: 0;
  /* 기준 75% 기준 → 65%~75% */
  left: 65%;
  width: 10%;
  background: rgba(251,191,36,.35);
  border-left: 2px dashed rgba(251,191,36,.9);
  border-right: 2px dashed rgba(251,191,36,.9);
  border-radius: 0;
  pointer-events: none;
}
/* 빨간 기준선 */
.gauge-mark {
  position: absolute;
  top: -6px; bottom: -6px;
  left: 75%;
  width: 4px;
  background: var(--coral);
  border-radius: 2px;
  box-shadow: 0 0 8px rgba(248,113,113,.65);
  transform: translateX(-50%);
}
.gauge-mark::after {
  content: '기준';
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 800;
  color: var(--coral);
  white-space: nowrap;
  letter-spacing: .01em;
}
/* 아래 캡션 */
.gauge-cap {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 18px;
}

/* 문 + 통과 판정 */
.verdict-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.door {
  font-size: 52px;
  line-height: 1;
  animation: dooropen .5s cubic-bezier(.34,1.56,.64,1) forwards .9s;
  transform-origin: left center;
  display: inline-block;
  transform: rotate(0deg) scale(1);
  filter: drop-shadow(0 0 12px rgba(52,211,153,.7));
}
@keyframes dooropen {
  from { transform: rotate(0deg) scale(1); }
  to   { transform: rotate(-10deg) scale(1.15); }
}
.verdict-text {
  background: var(--mint-light);
  color: #067A57;
  font-size: 15px;
  font-weight: 800;
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  flex: 1;
  line-height: 1.4;
}

@media (prefers-reduced-motion: reduce) {
  .gauge-fill { animation: none; width: 82%; }
  .door { animation: none; transform: rotate(-10deg) scale(1.15); }
}
</style>
</head>
<body>
<div class="card">
  <span class="chip">AI 탐험대 · 17강 · 얼굴 인식</span>
  <div class="score-row">
    <span class="label">유사도</span>
    <span class="num">82</span>
    <span class="denom">/ 100</span>
  </div>
  <div class="gauge" role="progressbar" aria-valuenow="82" aria-valuemin="0" aria-valuemax="100" aria-label="유사도 82">
    <div class="gauge-check" aria-hidden="true"></div>
    <div class="gauge-fill"></div>
    <div class="gauge-mark" aria-hidden="true"></div>
  </div>
  <p class="gauge-cap">
    <span>0</span>
    <span>노란 띠 = 확인 필요 구간</span>
    <span>100</span>
  </p>
  <div class="verdict-row">
    <span class="door" aria-label="문이 열림">🎉</span>
    <div class="verdict-text">🟢 통과! 82 ≥ 기준값 75<br>→ 문이 열려요</div>
  </div>
</div>
</body>
</html>
