<!-- @dsCard group="Components" name="칩·배너" subtitle="강 배지·명령어·안전 배너" width="600" height="280" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>칩 &amp; 배너 — AI 탐험대 디자인 시스템</title>
<style>
  :root {
    --sky:#5B9CF6; --sky-light:#EBF3FF;
    --mint:#34D399; --mint-light:#D1FAE5;
    --amber:#FBBF24; --amber-light:#FEF3C7;
    --coral:#F87171; --coral-light:#FEE2E2;
    --purple:#A78BFA; --purple-light:#EDE9FE;
    --bg:#F0F7FF; --card:#FFFFFF;
    --text:#1E293B; --text-muted:#64748B; --border:#E2E8F0;
    --radius:20px; --radius-sm:12px;
    --shadow:0 4px 20px rgba(91,156,246,.12);
    --shadow-lg:0 8px 40px rgba(91,156,246,.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    font-size: 14px;
    line-height: 1.5;
  }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .anno {
    font-size: 11px;
    font-weight: 700;
    color: var(--sky);
    background: var(--sky-light);
    padding: 1px 7px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 8px;
  }
  .group { margin-bottom: 18px; }

  /* 강 배지 칩 (.chip) — 실제 앱 그대로 */
  .chip {
    display: inline-block;
    background: var(--sky);
    color: white;
    font-size: 13px;
    font-weight: 800;
    padding: 5px 16px;
    border-radius: 999px;
    letter-spacing: .03em;
  }
  .chip.mint { background: var(--mint); }
  .chip.amber { background: var(--amber); color: #78350F; }
  .chip.coral { background: var(--coral); }
  .chip.purple { background: var(--purple); }

  /* 명령어 칩 (.cmd) — 실제 앱 그대로 */
  .cmd {
    display: inline-block;
    background: var(--amber-light);
    border: 1.5px solid var(--amber);
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 13.5px;
    font-weight: 700;
    margin: 2px;
    color: var(--text);
  }
  .cmd.sky {
    background: var(--sky-light);
    border-color: var(--sky);
    color: #1d4ed8;
  }
  .cmd.mint {
    background: var(--mint-light);
    border-color: var(--mint);
    color: #065f46;
  }

  /* 안전 문구 배너 (.safe) — 실제 앱 그대로 */
  .safe {
    background: var(--amber-light);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-size: 13px;
    text-align: center;
  }
  .safe.info {
    background: var(--sky-light);
    color: #1d4ed8;
  }
  .safe.ok {
    background: var(--mint-light);
    color: #065f46;
  }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .banner-stack { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
<p class="section-title">컴포넌트 — 칩 &amp; 배너</p>

<!-- 강 배지 칩 -->
<div class="group">
  <span class="anno">강 배지 칩 .chip</span>
  <div class="chip-row">
    <span class="chip">AI 탐험대 · 15 음성 명령 AI</span>
    <span class="chip mint">AI 탐험대 · 16</span>
    <span class="chip amber">AI 탐험대 · 17</span>
    <span class="chip coral">AI 탐험대 · 18</span>
    <span class="chip purple">AI 탐험대 · 19</span>
  </div>
</div>

<!-- 명령어 칩 -->
<div class="group">
  <span class="anno">명령어 칩 .cmd</span>
  <div class="chip-row">
    <span class="cmd">불 켜 줘</span>
    <span class="cmd">불 꺼 줘</span>
    <span class="cmd sky">다음으로</span>
    <span class="cmd mint">확인</span>
    <span class="cmd">멈춰</span>
  </div>
</div>

<!-- 안전 문구 배너 -->
<div class="group">
  <span class="anno">안전 문구 배너 .safe</span>
  <div class="banner-stack">
    <div class="safe">🛡️ 이름·주소 같은 개인정보는 말하지 않아요. 내 목소리는 화면에만 쓰이고 저장되지 않아요.</div>
    <div class="safe info">ℹ️ 이 브라우저는 실시간 음성 인식을 지원해요.</div>
    <div class="safe ok">✅ 마이크 권한이 허용됐어요. 말하기 시작해도 좋아요!</div>
  </div>
</div>
</body>
</html>
