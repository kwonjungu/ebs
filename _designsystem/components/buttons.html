<!-- @dsCard group="Components" name="버튼" subtitle="primary·mint·rec·gray" width="600" height="320" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버튼 — AI 탐험대 디자인 시스템</title>
<style>
  :root {
    --sky:#5B9CF6; --sky-light:#EBF3FF;
    --mint:#34D399; --mint-light:#D1FAE5;
    --amber:#FBBF24; --amber-light:#FEF3C7;
    --coral:#F87171; --coral-light:#FEE2E2;
    --purple:#A78BFA; --purple-light:#EDE9FE;
    --bg:#F0F7FF; --card:#FFFFFF;
    --text:#1E293B; --text-muted:#64748B; --border:#E2E8F0;
    --radius:20px; --radius-sm:12px;
    --shadow:0 4px 20px rgba(91,156,246,.12);
    --shadow-lg:0 8px 40px rgba(91,156,246,.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    font-size: 14px;
    line-height: 1.5;
  }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* 실제 앱 .btn 스타일 그대로 */
  .btn {
    display: inline-block;
    border: 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 15.5px;
    font-weight: 700;
    color: white;
    background: var(--sky);
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    min-height: 46px;
    min-width: 44px;
    transition: transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn:focus-visible { outline: 3px solid var(--sky); outline-offset: 3px; }
  .btn.mint { background: var(--mint); }
  .btn.rec {
    background: var(--coral);
    animation: pulse 1s infinite;
  }
  .btn.gray {
    background: #CBD5E1;
    color: var(--text-muted);
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(248,113,113,.45); }
    100% { box-shadow: 0 0 0 16px rgba(248,113,113,0); }
  }

  .btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 18px;
  }
  .anno {
    font-size: 11px;
    font-weight: 700;
    color: var(--sky);
    background: var(--sky-light);
    padding: 1px 7px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 10px;
  }

  .spec-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    background: white;
    border-radius: var(--radius-sm);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-top: 4px;
  }
  .spec-table th, .spec-table td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  .spec-table thead th {
    background: var(--sky);
    color: white;
    font-size: 11px;
    font-weight: 700;
  }
  .spec-table tbody th {
    background: var(--sky-light);
    font-weight: 700;
    width: 28%;
  }
  .swatch-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<p class="section-title">컴포넌트 — 버튼</p>

<span class="anno">라이브 프리뷰</span>
<div class="btn-row">
  <button class="btn">소리 크기 재기 시작</button>
  <button class="btn mint">결과 확인</button>
  <button class="btn rec">🎤 녹음 중…</button>
  <button class="btn gray">비활성화</button>
</div>

<table class="spec-table">
  <thead>
    <tr><th>클래스</th><th>배경색</th><th>용도</th></tr>
  </thead>
  <tbody>
    <tr>
      <th>.btn (primary)</th>
      <td><span class="swatch-dot" style="background:#5B9CF6;"></span><code>--sky #5B9CF6</code></td>
      <td>기본 동작 시작 / CTA</td>
    </tr>
    <tr>
      <th>.btn.mint</th>
      <td><span class="swatch-dot" style="background:#34D399;"></span><code>--mint #34D399</code></td>
      <td>확인·완료·긍정 액션</td>
    </tr>
    <tr>
      <th>.btn.rec</th>
      <td><span class="swatch-dot" style="background:#F87171;"></span><code>--coral #F87171</code> + pulse</td>
      <td>녹음·위험·정지 (맥박 애니)</td>
    </tr>
    <tr>
      <th>.btn.gray</th>
      <td><span class="swatch-dot" style="background:#CBD5E1;"></span><code>#CBD5E1</code></td>
      <td>비활성·보조</td>
    </tr>
  </tbody>
</table>
</body>
</html>
